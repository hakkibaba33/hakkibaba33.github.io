<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tack för din beställning | DEKORIST</title>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="/assets/js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(135deg, #f5f0eb 0%, #e8e4df 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .success-box { background: white; padding: 60px 50px; border-radius: 20px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.1); max-width: 520px; width: 100%; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .success-icon { width: 90px; height: 90px; background: linear-gradient(135deg, #d1fae5, #a7f3d0); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; font-size: 42px; animation: scaleIn 0.5s ease 0.3s both; }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        h1 { font-family: 'Playfair Display', Georgia, serif; color: #1a1a1a; margin-bottom: 12px; font-size: 2rem; font-weight: 600; }
        .subtitle { color: #666; line-height: 1.7; font-size: 1rem; margin-bottom: 8px; }
        .status-box { background: #f9fafb; border-radius: 12px; padding: 20px; margin: 24px 0; border: 1px solid #e5e7eb; }
        .status-loading { color: #c9a96e; font-weight: 600; }
        .status-success { color: #059669; font-weight: 600; }
        .status-error { color: #dc2626; font-weight: 600; }
        .order-id { background: #1a1a1a; color: #c9a96e; padding: 10px 20px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; margin: 12px 0; display: inline-block; letter-spacing: 1px; }
        .order-details { text-align: left; margin-top: 20px; }
        .order-details h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 12px; font-weight: 600; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #666; }
        .detail-value { color: #1a1a1a; font-weight: 500; }
        .home-btn { display: inline-block; margin-top: 28px; padding: 16px 40px; background: #1a1a1a; color: white; text-decoration: none; border-radius: 100px; font-weight: 600; transition: all 0.3s; border: none; cursor: pointer; font-size: 15px; }
        .home-btn:hover { background: #c9a96e; color: #1a1a1a; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,169,110,0.3); }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #c9a96e; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .retry-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #dc2626; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .retry-btn:hover { background: #b91c1c; }
        @media (max-width: 480px) { .success-box { padding: 40px 24px; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="success-icon">✅</div>
        <h1>Tack för din beställning!</h1>
        <p class="subtitle">Din betalning bearbetas. Vänligen vänta...</p>
        <div class="status-box" id="status-box">
            <p id="status-text" class="status-loading"><span class="spinner"></span>Kontrollerar betalning...</p>
        </div>
        <div id="order-info" class="hidden">
            <div class="order-details" id="order-details"></div>
        </div>
        <a href="/" class="home-btn">Tillbaka till butiken</a>
    </div>

    <script>
        async function processOrder() {
            const urlParams = new URLSearchParams(window.location.search);
            const paymentIntentId = urlParams.get('payment_intent');
            const paymentIntentClientSecret = urlParams.get('payment_intent_client_secret');
            const redirectStatus = urlParams.get('redirect_status');
            
            console.log('>>> Tack sayfasi yuklendi');
            console.log('>>> payment_intent:', paymentIntentId);
            console.log('>>> redirect_status:', redirectStatus);

            const statusText = document.getElementById('status-text');
            const orderInfo = document.getElementById('order-info');
            const orderDetails = document.getElementById('order-details');

            // localStorage'dan sipariş bilgilerini al
            let pendingOrder = null;
            try {
                pendingOrder = JSON.parse(localStorage.getItem('dkrug_pending_order'));
            } catch (e) {
                console.error('pendingOrder parse hatasi:', e);
            }

            if (!paymentIntentId) {
                statusText.className = 'status-error';
                statusText.innerHTML = '❌ Betalningsinformation saknas.';
                return;
            }

            // Eğer redirect_status zaten succeeded ise Stripe kontrolü atla (daha hızlı)
            let isPaymentSuccessful = false;
            
            if (redirectStatus === 'succeeded') {
                console.log('>>> redirect_status = succeeded, Stripe kontrolü atlanıyor');
                isPaymentSuccessful = true;
            } else if (paymentIntentClientSecret) {
                // Stripe.js ile kontrol et
                try {
                    console.log('>>> Stripe ödeme kontrolü...');
                    const stripe = Stripe(CONFIG.STRIPE.PUBLISHABLE_KEY);
                    const { paymentIntent } = await stripe.retrievePaymentIntent(paymentIntentClientSecret);
                    console.log('>>> PaymentIntent status:', paymentIntent.status);
                    isPaymentSuccessful = paymentIntent.status === 'succeeded';
                } catch (stripeErr) {
                    console.error('>>> Stripe kontrol hatasi:', stripeErr);
                }
            }

            if (!isPaymentSuccessful) {
                statusText.className = 'status-error';
                statusText.innerHTML = '❌ Betalningen misslyckades eller avbröts.';
                return;
            }

            // Ödeme başarılı! Siparişi kaydet ve email gönder
            statusText.className = 'status-loading';
            statusText.innerHTML = '<span class="spinner"></span>Sparar din beställning...';

            if (!pendingOrder) {
                statusText.className = 'status-error';
                statusText.innerHTML = '❌ Beställningsinformation saknas. Kontakta kundtjänst.';
                return;
            }

            try {
                const confirmData = {
                    payment_intent_id: paymentIntentId,
                    items: pendingOrder.items,
                    customer: pendingOrder.customer
                };

                console.log('>>> confirm-order istegi gonderiliyor...');

                const response = await fetch(CONFIG.API.CONFIRM_ORDER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(confirmData)
                });

                const result = await response.json();
                console.log('>>> confirm-order sonuc:', result);

                if (!response.ok) {
                    throw new Error(result.error || 'Något gick fel');
                }

                // Başarılı! Detayları göster
                localStorage.removeItem('dkrug_pending_order');
                localStorage.removeItem('siteCartItems');
                localStorage.removeItem('dkrug_checkout_customer');

                statusText.className = 'status-success';
                statusText.innerHTML = '✅ Din beställning är bekräftad!';

                const total = pendingOrder.items.reduce((sum, item) => 
                    sum + (parseFloat(item.price) * (item.quantity || 1)), 0);

                orderInfo.classList.remove('hidden');
                orderDetails.innerHTML = 
                    '<h3>Beställningsdetaljer</h3>' +
                    '<div class="detail-row"><span class="detail-label">Ordernummer:</span><span class="detail-value">#' + (result.orderNumber || 'N/A') + '</span></div>' +
                    '<div class="detail-row"><span class="detail-label">Betalnings-ID:</span><span class="detail-value">' + paymentIntentId + '</span></div>' +
                    '<div class="detail-row"><span class="detail-label">Totalt:</span><span class="detail-value">' + total.toLocaleString('sv-SE') + ' SEK</span></div>' +
                    '<div class="detail-row"><span class="detail-label">Betalningsmetod:</span><span class="detail-value">Stripe</span></div>' +
                    '<div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value">Bekräftad</span></div>' +
                    (pendingOrder.customer.email ? '<div class="detail-row"><span class="detail-label">E-post:</span><span class="detail-value">' + pendingOrder.customer.email + '</span></div>' : '') +
                    '<div class="detail-row"><span class="detail-label">Produkter:</span><span class="detail-value">' + pendingOrder.items.length + ' st</span></div>';

            } catch (error) {
                console.error('>>> Hata:', error);
                statusText.className = 'status-error';
                statusText.innerHTML = '❌ Ett fel uppstod: ' + error.message + 
                    '<br><button class="retry-btn" onclick="location.reload()">Försök igen</button>';
            }
        }

        // Sayfa yüklendiğinde çalıştır
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', processOrder);
        } else {
            processOrder();
        }
    </script>
</body>
</html>
