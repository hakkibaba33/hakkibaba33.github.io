<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sidan hittades inte</title>
  <script>
    // Hash router'ı kaldır, normal URL'ye yönlendir
    if (window.location.hash && window.location.hash.startsWith('#/')) {
      var cleanPath = window.location.hash.replace('#', '');
      window.location.replace(cleanPath);
    }
  </script>
</head>
<body>
  <h1>404 - Sidan hittades inte</h1>
  <p><a href="/">Tillbaka till startsidan</a></p>
</body>
</html>
