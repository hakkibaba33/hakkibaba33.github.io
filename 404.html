<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Mevcut URL'yi al ve hash'e çevir
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('/#' + path);
  </script>
</head>
<body>
  <p>Yönlendiriliyor...</p>
</body>
</html>
