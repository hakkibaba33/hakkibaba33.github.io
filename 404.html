<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Eski hash router'ı kaldır, normal URL'ye yönlendir
    if (window.location.hash && window.location.hash.startsWith('#/')) {
      var cleanPath = window.location.hash.replace('#', '');
      window.location.replace(cleanPath);
    } else {
      // Normal 404, ana sayfaya git
      window.location.href = '/';
    }
  </script>
</head>
<body>
  <p>Yönlendiriliyor...</p>
</body>
</html>
