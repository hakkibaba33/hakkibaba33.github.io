<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title id="page-title-product-name">Ürün Sayfası</title>
    <link rel="stylesheet" href="/assets/css/product.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/reset.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container product-page">
            <nav class="custom-cat-breadcrumb-unique">
                <div class="breadcrumb-inner-wrapper">
                    <a href="javascript:history.back()" class="breadcrumb-back-trigger">Tillbaka</a>
                    <span class="breadcrumb-divider"> > </span>
                    <a href="/alla-mattor">Alla Mattor</a>
                    <span class="separator"> > </span>
                    <span class="current-item" id="breadcrumb-product-name">---</span>
                </div>
            </nav>

            <div class="product-content">
                <!-- SOL: Görsel Galerisi -->
                <div class="product-gallery">
                    <!-- 2 Büyük Resim Yan Yana -->
                    <div class="main-display-wrapper" id="product-images-container"></div>
                    <!-- Thumbnail'lar -->
                    <div class="gallery-thumbnail-list" id="gallery-thumbnail-list"></div>
                </div>

                <!-- SAĞ: Ürün Detayları -->
                <div class="product-details">
                    <div class="brand-label-top">DKRUG SWEDEN</div>
                    <h1 id="product-main-name-desktop">---</h1> 

                    <div class="product-price-display">
                        <span class="current-price" id="product-price">---</span>
                        <span class="tax-info-static">(Inkl. moms)</span>
                    </div>

                    <!-- 🆕 VARYASYON AKORDİYONU -->
                    <div id="variant-accordion-wrapper" class="variant-accordion-box">
                        <button class="variant-accordion-header" id="variant-accordion-btn">
                            <div class="accordion-left">
                                <i class="fa-solid fa-ruler-combined"></i>
                                <div class="accordion-title-group">
                                    <span class="accordion-title">Välj storlek</span>
                                    <span class="accordion-subtitle" id="selected-variant-display">Ingen storlek vald</span>
                                </div>
                            </div>
                            <div class="accordion-right">
                                <span class="accordion-status" id="variant-status" style="display:none;">Vald</span>
                                <i class="fa-solid fa-chevron-right accordion-chevron"></i>
                            </div>
                        </button>
                    </div>

                    <div class="action-buttons">
                        <button class="add-to-cart-btn" id="add-to-cart-btn">Lägg i Varukorg</button>
                        <button class="ana-urun-favori-buton"><i class="fa-regular fa-heart"></i></button>
                    </div>

                    <div class="product-accordion-wrapper">
                        <div class="product-accordion-item">
                            <button class="product-accordion-header"><h3>Produktbeskrivning</h3></button>
                            <div class="product-accordion-content" id="product-description"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- 🆕 VARYASYON DRAWER (Sağdan Açılan) -->
    <div class="variant-drawer-overlay" id="variant-drawer-overlay">
        <div class="variant-drawer" id="variant-drawer">
            <div class="variant-drawer-header">
                <h3>Välj storlek</h3>
                <button class="close-drawer-btn" id="close-variant-drawer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="variant-drawer-body" id="variant-drawer-body">
                <!-- Varyasyonlar buraya JS ile gelecek -->
            </div>
        </div>
    </div>

    <script>
        async function loadComponents() {
            try {
                const [headerRes, footerRes] = await Promise.all([
                    fetch('/header.html'),
                    fetch('/footer.html')
                ]);

                if (!headerRes.ok || !footerRes.ok) return;

                document.getElementById('header-placeholder').innerHTML = await headerRes.text();
                document.getElementById('footer-placeholder').innerHTML = await footerRes.text();

                if (typeof initEventListeners === 'function') initEventListeners();
            } catch (error) {
                console.error("Component yükleme hatası:", error);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadComponents);
        } else {
            loadComponents();
        }
    </script>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/product.ui.js"></script>
</body>
</html>
